<h1>Categories</h1>

<ul>
    {% for category in categories %}
        <li>
            <a href="{% url 'category_products' category.id %}">{{ category.name }}</a>
        </li>
    {% empty %}
        <li>No categories yet.</li>
    {% endfor %}
</ul>

<p><a href="{% url 'products' %}">All products</a></p>
